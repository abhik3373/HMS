{% extends 'base.html' %}
{% block title %}Delete Slot - HMS{% endblock %}
{% block content %}
<div class="container" style="max-width:480px;">
    <div class="card" style="text-align:center; padding:2.5rem;">
        <div style="font-size:3rem; margin-bottom:1rem;">🗑️</div>
        <h2 style="margin-bottom:0.5rem;">Delete this slot?</h2>
        <p style="color:var(--text-muted); margin-bottom:1.5rem;">
            {{ slot.date|date:"D, d M Y" }} &nbsp;|&nbsp; {{ slot.start_time|time:"H:i" }} – {{ slot.end_time|time:"H:i" }}
        </p>
        <p style="color:var(--danger); font-size:0.9rem; margin-bottom:1.5rem;">This action cannot be undone.</p>
        <form method="post" style="display:flex; gap:0.8rem; justify-content:center;">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'doctor_dashboard' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
